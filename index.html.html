<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portmarnock Departures</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0d12;
    --panel: #0f1318;
    --border: #1e2530;
    --amber: #f5a623;
    --amber-dim: #a06a10;
    --green: #2ecc71;
    --red: #e74c3c;
    --orange: #f39c12;
    --text: #e8dcc8;
    --text-dim: #6b7280;
    --rail-blue: #1a6eb5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 16px 20px 12px;
  }

  /* Subtle scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 14px;
  }

  .station-name {
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--amber);
    text-shadow: 0 0 20px rgba(245,166,35,0.4);
  }

  .station-sub {
    font-size: 0.85rem;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 2px;
    font-weight: 300;
  }

  .header-right {
    text-align: right;
  }

  .clock {
    font-family: 'Share Tech Mono', monospace;
    font-size: 2.4rem;
    color: var(--amber);
    text-shadow: 0 0 15px rgba(245,166,35,0.5);
    letter-spacing: 0.05em;
  }

  .date-line {
    font-size: 0.8rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 2px;
    text-align: right;
  }

  /* Column headers */
  .col-headers {
    display: grid;
    grid-template-columns: 90px 1fr 140px 110px 90px;
    gap: 0 12px;
    padding: 0 14px 8px;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }

  /* Train rows */
  .trains {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .train-row {
    display: grid;
    grid-template-columns: 90px 1fr 140px 110px 90px;
    gap: 0 12px;
    align-items: center;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
    animation: rowIn 0.4s ease both;
  }

  .train-row:nth-child(1) { animation-delay: 0.05s; }
  .train-row:nth-child(2) { animation-delay: 0.1s; }
  .train-row:nth-child(3) { animation-delay: 0.15s; }
  .train-row:nth-child(4) { animation-delay: 0.2s; }

  @keyframes rowIn {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* Left colour accent bar */
  .train-row::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--rail-blue);
    border-radius: 6px 0 0 6px;
  }

  .train-row.on-time::before  { background: var(--green); }
  .train-row.delayed::before  { background: var(--orange); }
  .train-row.cancelled::before { background: var(--red); }

  .col-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.6rem;
    color: var(--amber);
    font-weight: 400;
    letter-spacing: 0.03em;
  }

  .col-dest {
    font-size: 1.35rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .col-dest .via {
    display: block;
    font-size: 0.72rem;
    font-weight: 300;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .col-status {
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .status-ontime   { color: var(--green); }
  .status-delayed  { color: var(--orange); }
  .status-cancelled { color: var(--red); }

  .col-train {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .col-countdown {
    text-align: right;
  }

  .countdown-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1;
  }

  .countdown-label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 1px;
  }

  .urgent   { color: var(--red);    text-shadow: 0 0 10px rgba(231,76,60,0.6); }
  .soon     { color: var(--orange); text-shadow: 0 0 10px rgba(243,156,18,0.4); }
  .comfortable { color: var(--green); }

  /* Footer */
  footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    margin-top: 10px;
  }

  .footer-brand {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .ir-dot {
    width: 8px; height: 8px;
    background: var(--rail-blue);
    border-radius: 50%;
  }

  .refresh-info {
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    font-family: 'Share Tech Mono', monospace;
  }

  .pulse {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 2s infinite;
    vertical-align: middle;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.7); }
  }

  .loading {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-dim);
    font-size: 1rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .loading-bar {
    width: 160px;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .loading-bar::after {
    content: '';
    display: block;
    height: 100%;
    width: 40%;
    background: var(--amber);
    border-radius: 2px;
    animation: loadSlide 1.2s ease-in-out infinite;
  }

  @keyframes loadSlide {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }

  .error-msg {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    color: var(--red);
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="station-name">Portmarnock</div>
    <div class="station-sub">Live Departures · DART / Northern Line</div>
  </div>
  <div class="header-right">
    <div class="clock" id="clock">--:--:--</div>
    <div class="date-line" id="dateline">---</div>
  </div>
</header>

<div class="col-headers">
  <span>Departs</span>
  <span>Destination</span>
  <span>Status</span>
  <span>Train</span>
  <span style="text-align:right">Leaves in</span>
</div>

<div class="trains" id="trains">
  <div class="loading">
    <div>Fetching departures</div>
    <div class="loading-bar"></div>
  </div>
</div>

<footer>
  <div class="footer-brand">
    <div class="ir-dot"></div>
    Iarnród Éireann · Real-time
  </div>
  <div class="refresh-info">
    <span class="pulse"></span>
    <span id="last-updated">Updating…</span>
  </div>
</footer>

<script>
const STATION_NAME = 'Portmarnock';
const API_BASE = `http://api.irishrail.ie/realtime/realtime.asmx/getStationDataByNameXML?StationDesc=${STATION_NAME}`;

// Multiple CORS proxies to try in order
const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`,
];

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-IE', { hour12: false });
  document.getElementById('dateline').textContent =
    now.toLocaleDateString('en-IE', { weekday: 'long', day: 'numeric', month: 'long' });
}
setInterval(updateClock, 1000);
updateClock();

// Try each proxy in turn
async function fetchWithFallback() {
  for (const makeUrl of PROXIES) {
    try {
      const res = await fetch(makeUrl(API_BASE), { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const text = await res.text();
      // Sanity check — should contain XML train data
      if (text.includes('objStationData') || text.includes('ArrayOfObjStationData')) {
        return text;
      }
      // Might be empty (no trains right now) but still valid XML
      if (text.includes('ArrayOf')) return text;
    } catch (e) {
      // Try next proxy
    }
  }
  throw new Error('All proxies failed');
}

// Parse XML response from Irish Rail
function parseTrains(xmlText) {
  const parser = new DOMParser();
  const xml = parser.parseFromString(xmlText, 'text/xml');
  const nodes = xml.querySelectorAll('objStationData');
  const trains = [];

  nodes.forEach(n => {
    const get = tag => n.querySelector(tag)?.textContent?.trim() ?? '';
    const duein = parseInt(get('Duein') || '999', 10);
    trains.push({
      trainCode:   get('Traincode'),
      destination: get('Destination'),
      schDepart:   get('Schdepart'),
      late:        parseInt(get('Late') || '0', 10),
      status:      get('Status'),
      direction:   get('Direction'),
      dueMins:     duein,
    });
  });

  return trains
    .filter(t => t.dueMins >= 0 && t.dueMins < 120)
    .sort((a, b) => a.dueMins - b.dueMins)
    .slice(0, 5);
}

function countdownClass(mins) {
  if (mins <= 3) return 'urgent';
  if (mins <= 8) return 'soon';
  return 'comfortable';
}

function rowClass(late, status) {
  if (status === 'Cancelled') return 'cancelled';
  if (late > 2) return 'delayed';
  return 'on-time';
}

function statusLabel(late, status) {
  if (status === 'Cancelled') return { cls: 'status-cancelled', text: 'Cancelled' };
  if (late > 2) return { cls: 'status-delayed', text: `+${late} min` };
  return { cls: 'status-ontime', text: 'On Time' };
}

function viaText(direction) {
  if (!direction) return '';
  return direction.toLowerCase().includes('north')
    ? 'via Malahide · Drogheda'
    : 'via Clontarf · Connolly';
}

function renderTrains(trains) {
  const container = document.getElementById('trains');

  if (!trains.length) {
    container.innerHTML = `<div class="error-msg">No upcoming departures in next 2 hours</div>`;
    return;
  }

  container.innerHTML = trains.map(t => {
    const rc  = rowClass(t.late, t.status);
    const sl  = statusLabel(t.late, t.status);
    const cc  = countdownClass(t.dueMins);
    const due = t.dueMins === 0 ? 'Now' : `${t.dueMins}`;
    const unit = t.dueMins === 0 ? '' : t.dueMins === 1 ? 'min' : 'mins';

    return `
      <div class="train-row ${rc}">
        <div class="col-time">${t.schDepart}</div>
        <div class="col-dest">
          ${t.destination}
          <span class="via">${viaText(t.direction)}</span>
        </div>
        <div class="col-status ${sl.cls}">${sl.text}</div>
        <div class="col-train">${t.trainCode}</div>
        <div class="col-countdown">
          <div class="countdown-num ${cc}">${due}</div>
          <div class="countdown-label">${unit}</div>
        </div>
      </div>`;
  }).join('');
}

async function refresh() {
  try {
    const text = await fetchWithFallback();
    const trains = parseTrains(text);
    renderTrains(trains);
    const now = new Date();
    document.getElementById('last-updated').textContent =
      `Updated ${now.toLocaleTimeString('en-IE', { hour12: false })}`;
  } catch (e) {
    // Keep last data if available, just show warning in footer
    document.getElementById('last-updated').textContent = 'Update failed — retrying…';
    // If trains div still shows loading spinner, show error
    if (document.querySelector('.loading')) {
      document.getElementById('trains').innerHTML =
        `<div class="error-msg">⚠ Could not reach Irish Rail API</div>`;
    }
  }
}

refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
